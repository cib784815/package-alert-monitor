name: USPS package monitor

on:
  schedule:
    - cron: "7,27,47 * * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  monitor:
    runs-on: macos-15-intel
    timeout-minutes: 10
    env:
      CLOUDFLARE_MANUAL_RUN_KEY: ${{ secrets.CLOUDFLARE_MANUAL_RUN_KEY }}
      CLOUDFLARE_WORKER_URL: ${{ secrets.CLOUDFLARE_WORKER_URL }}
      GITHUB_EVENT_NAME: ${{ github.event_name }}
      NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
      NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}

    steps:
      - name: Check out monitor
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Test monitor logic
        run: npm test

      - name: Check USPS and notify
        id: monitor
        run: npm run monitor

      - name: Stop after delivery
        if: steps.monitor.outputs.delivered == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api --method PUT "repos/${{ github.repository }}/actions/workflows/package-monitor.yml/disable"
